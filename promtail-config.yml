server:
  http_listen_port: 9080
  grpc_listen_port: 9095

positions:
  filename: /tmp/positions.yaml  # Track positions for log scraping

clients:
  - url: http://wedding-loki:3100/loki/api/v1/push  # Push logs to Loki

scrape_configs:
  - job_name: 'go-logs'
    static_configs:
      - labels:
          job: "go-logs"
          #__path__: /var/log/go_logs/*.log
          __path__: /var/lib/docker/containers/*/*-json.log # this is the log file being watched
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            timestamp: timestamp
            response_time: duration  # Capture response time from log message
            query: query
            status: status
            throughput: throughput
            latency: latency
            caller: caller  # Capture other important fields
            org_id: org_id
            trace_id: traceID
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.000000000Z"
