services:
  gateway_service:
    container_name: gateway_service
    build:
      context: .
      dockerfile: services/gateway_service/Dockerfile
    restart: "no"
    depends_on:
      - wedding_service
      - tinyserver
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - type: bind
        source: ./.docker/gateway_service
        target: /data
    env_file:
      - .env
    networks:
      - wedding-network

  wedding_service:
    container_name: wedding_service
    build:
      context: .
      dockerfile: services/wedding_service/Dockerfile
    restart: "no"
    command: ["-frontend", "/app/webserver/website/frontend/out", "-hotreload", "true"]
    expose:
      - "${WEDDING_SERVICE_HTTP_PORT}"
    volumes:
      - type: bind
        source: ./.docker/wedding_service
        target: /data
      - type: bind
        source: ./services/wedding_service/webserver/website/frontend/out
        target: /app/webserver/website/frontend/out
    env_file:
      - .env
    networks:
      - wedding-network

  tinyserver:
    container_name: tinyserver
    build:
      context: .
      dockerfile: services/tinyserver/Dockerfile
    restart: "no"
    expose:
      - "80"
    networks:
      - wedding-network

networks:
  wedding-network:
    driver: bridge
