name: Go Test Automation

on:
  pull_request:
    branches: [development]
  push:
    branches: [development, test-staging, latest-release]

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'
          cache: false

      - name: Download dependencies
        run: go mod download
        working-directory: src

      - name: Copy .env.example to .env
        run: cp src/.env.example src/.env

      - name: Set environment variable GOOS=linux in .env
        run: echo -e "\nGOOS=linux" >> .env

      - name: Install swag CLI
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.4
        working-directory: src

      - name: Run go generate using Makefile
        run: make go-generate

      - name: Run tests using Makefile
        run: make test

      - name: Run tests with coverage
        run: make test-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: src/coverage.out

      - name: Run benchmarks
        run: make bench

  build:
    name: Run Go Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'
          cache: false

      - name: Build application using Makefile
        run: make go-build-for-github
