name: Go Test Automation

on:
  pull_request:
    branches: [development]
  push:
    branches: [development, test-staging, latest-release]

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.4'
          cache: false

      - name: Create minimal .env
        run: |
          echo "SERVICE_NAME=wedding_service" > .env
          echo "GOOS=linux" >> .env

      - name: Install swag CLI
        run: go install github.com/swaggo/swag/cmd/swag@v1.16.4 # don't upgrade to 1.16.5, super unstable

      - name: Run go generate using Makefile
        run: make go-generate

      - name: Run tests using Makefile
        run: make test

      - name: Run tests with coverage
        run: make test-coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

      - name: Run benchmarks
        run: make bench

  build:
    name: Run Go Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache: false

      - name: Create minimal .env
        run: |
          echo "APP_NAME=wedding_service" > .env
          echo "GOOS=linux" >> .env

      - name: Build application using Makefile
        run: make go-build-for-github
