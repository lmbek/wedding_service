name: Go Test Automation

on:
  pull_request:
    branches: [development]
  push:
    branches: [development, test-staging, latest-release]

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'

      - name: Download dependencies
        run: go mod tidy

      - name: Run tests
        run: go test -v ./...

  #      - name: Run benchmarks
  #        run: go test -bench . -benchmem ./...

  build:
    name: Run Go Build
    runs-on: ubuntu-latest
    needs: test  # Waits for tests to pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'

      - name: Build application
        run: go build -o app

